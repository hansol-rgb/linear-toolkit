<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5E6AD2"/>
      <stop offset="100%" style="stop-color:#3B41A8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>

  <!-- Robot head -->
  <rect x="136" y="160" width="240" height="200" rx="40" fill="white" opacity="0.95"/>

  <!-- Eyes -->
  <circle cx="210" cy="260" r="24" fill="#5E6AD2"/>
  <circle cx="302" cy="260" r="24" fill="#5E6AD2"/>

  <!-- Eye shine -->
  <circle cx="200" cy="250" r="8" fill="white"/>
  <circle cx="292" cy="250" r="8" fill="white"/>

  <!-- Smile -->
  <path d="M 210 310 Q 256 345 302 310" stroke="#5E6AD2" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Antenna -->
  <line x1="256" y1="160" x2="256" y2="110" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="100" r="16" fill="#A8B1FF"/>

  <!-- Chat bubble (right side) -->
  <rect x="330" y="130" width="80" height="56" rx="16" fill="#A8B1FF"/>
  <polygon points="340,186 330,200 355,186" fill="#A8B1FF"/>

  <!-- Chat bubble dots -->
  <circle cx="352" cy="158" r="6" fill="white"/>
  <circle cx="370" cy="158" r="6" fill="white"/>
  <circle cx="388" cy="158" r="6" fill="white"/>
</svg>
